<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Drop – Coming Soon</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    height: 100vh;
    overflow: hidden;
    position: relative;
    color: white;
}

/* Background */
.background {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('background.jpg') center/cover no-repeat;
    filter: blur(8px);
    transform: scale(1.1);
}

/* Overlay */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, rgba(0,0,0,0.65), rgba(15,15,25,0.8));
}

/* Glow */
.glow {
    position: absolute;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(255,255,255,0.25), transparent 70%);
    top: 20%;
    left: 30%;
    filter: blur(100px);
    animation: float 6s infinite ease-in-out alternate;
}

@keyframes float {
    from { transform: translateY(-20px); }
    to { transform: translateY(20px); }
}

/* Main container */
.glass-container {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* Glass card */
.glass-card {
    backdrop-filter: blur(25px);
    background: rgba(255,255,255,0.08);
    border-radius: 30px;
    padding: 70px 90px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    max-width: 850px;
}

/* Title */
.glass-title {
    font-size: 72px;
    font-weight: 800;
    background: linear-gradient(145deg, #ffffff, #cfd9ff, #ffffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 
        0 0 10px rgba(255,255,255,0.6),
        0 0 25px rgba(200,220,255,0.4);
    letter-spacing: 4px;
}

/* Subtitle */
.subtitle {
    margin-top: 25px;
    font-size: 18px;
    font-weight: 300;
    letter-spacing: 5px;
    color: rgba(255,255,255,0.75);
}

/* Instagram Section */
.instagram-section {
    margin-top: 50px;
    padding-top: 30px;
    border-top: 1px solid rgba(255,255,255,0.15);
}

.instagram-label {
    font-size: 12px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 12px;
}

.instagram-handle {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 3px;
    color: white;
    text-decoration: none;
    transition: all 0.4s ease;
}

.instagram-handle:hover {
    text-shadow: 0 0 15px rgba(255,255,255,0.8);
    opacity: 0.85;
}

/* Responsive */
@media(max-width: 768px){
    .glass-card {
        padding: 50px 30px;
    }
    .glass-title {
        font-size: 44px;
    }
}
</style>
</head>

<body>

<div class="background"></div>
<div class="overlay"></div>
<div class="glow"></div>

<div class="glass-container">
    <div class="glass-card">
        <h1 class="glass-title">COMING SOON</h1>
        <p class="subtitle">SECOND STATE SUMMER 2026</p>

        <div class="instagram-section">
            <div class="instagram-label">FOLLOW US</div>
            <a href="https://instagram.com/scndstate" target="_blank" class="instagram-handle">
                @scndstate
            </a>
        </div>
    </div>
</div>

</body>
</html>
